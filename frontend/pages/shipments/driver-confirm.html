<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Assignments | LogiTrack Driver</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --bg: #0a0f1e;
      --glass: rgba(255,255,255,0.05);
      --glass-border: rgba(255,255,255,0.1);
      --glass-hover: rgba(255,255,255,0.08);
      --primary: #6c63ff;
      --primary-light: #8b85ff;
      --accent: #00d4ff;
      --success: #00e676;
      --warning: #ffa726;
      --danger: #ff5252;
      --text: #e8eaf6;
      --text-muted: #9ba3c7;
      --radius: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(108,99,255,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(0,212,255,0.1) 0%, transparent 50%);
      padding: 32px 20px;
    }

    .container { max-width: 720px; margin: 0 auto; }

    .header { text-align: center; margin-bottom: 36px; }
    .header h1 {
      font-size: 28px; font-weight: 700;
      background: linear-gradient(135deg, var(--text), var(--primary-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    .header p { color: var(--text-muted); font-size: 14px; }

    .card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      backdrop-filter: blur(20px);
      padding: 24px;
      margin-bottom: 20px;
    }

    /* Awaiting confirmation highlight */
    .card.awaiting {
      border-color: rgba(255,167,38,0.35);
      background: rgba(255,167,38,0.05);
    }

    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px; flex-wrap: wrap; gap: 10px;
    }

    .shipment-id { font-size: 18px; font-weight: 700; color: var(--primary-light); }

    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
    }
    .badge-pending { background: rgba(255,167,38,0.15); color: var(--warning); border: 1px solid rgba(255,167,38,0.3); }
    .badge-assigned { background: rgba(0,230,118,0.12); color: var(--success); border: 1px solid rgba(0,230,118,0.3); }
    .badge-transit { background: rgba(0,212,255,0.12); color: var(--accent); border: 1px solid rgba(0,212,255,0.3); }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px; margin-bottom: 18px;
    }
    .info-item label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); }
    .info-item p { font-size: 14px; font-weight: 500; color: var(--text); margin-top: 4px; }

    .route-visual {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px; padding: 14px 18px; margin-bottom: 18px;
    }
    .route-point { flex: 1; }
    .route-point .label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; }
    .route-point .city { font-size: 15px; font-weight: 600; color: var(--text); margin-top: 4px; }
    .route-point .addr { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .route-arrow { color: var(--primary-light); font-size: 20px; flex-shrink: 0; }

    /* Accept / Reject buttons */
    .action-bar {
      display: flex; gap: 12px; flex-wrap: wrap;
      padding-top: 18px; border-top: 1px solid var(--glass-border);
    }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 24px; border-radius: 12px;
      font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s;
    }
    .btn-accept {
      background: linear-gradient(135deg, #00c853, #00e676);
      color: #001a0a; box-shadow: 0 4px 20px rgba(0,230,118,0.3);
    }
    .btn-accept:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(0,230,118,0.5); }
    .btn-reject {
      background: rgba(255,82,82,0.12);
      color: var(--danger); border: 1px solid rgba(255,82,82,0.3);
    }
    .btn-reject:hover { background: rgba(255,82,82,0.22); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

    /* Already confirmed state */
    .confirmed-banner {
      display: flex; align-items: center; gap: 12px;
      background: rgba(0,230,118,0.08); border: 1px solid rgba(0,230,118,0.2);
      border-radius: 10px; padding: 12px 16px; font-size: 14px; color: var(--success);
    }

    /* Empty state */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-state i { font-size: 48px; margin-bottom: 16px; display: block; opacity: 0.3; }
    .empty-state h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }

    /* Spinner */
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.2); border-top-color: #001a0a; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Alert */
    .alert { padding: 14px 18px; border-radius: 10px; font-size: 14px; display: none; align-items: center; gap: 10px; margin-bottom: 20px; }
    .alert.show { display: flex; }
    .alert-error { background: rgba(255,82,82,0.1); border: 1px solid rgba(255,82,82,0.3); color: #ff8a80; }
    .alert-success { background: rgba(0,230,118,0.1); border: 1px solid rgba(0,230,118,0.3); color: #69f0ae; }

    .loading-dots span { display: inline-block; width: 8px; height: 8px; background: var(--primary-light); border-radius: 50%; margin: 0 3px; animation: bounce 1.2s infinite; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>🚛 My Assignments</h1>
    <p>Review and confirm shipments assigned to you</p>
  </div>

  <div class="alert alert-error" id="alertError"><i class="fas fa-exclamation-circle"></i><span id="errorMsg"></span></div>
  <div class="alert alert-success" id="alertSuccess"><i class="fas fa-check-circle"></i><span id="successMsg"></span></div>

  <div id="shipmentsList">
    <div class="empty-state">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <p style="margin-top:12px">Loading your shipments...</p>
    </div>
  </div>

</div>

<script>
  const API = '';
  const token = () => localStorage.getItem('token');

  window.addEventListener('DOMContentLoaded', loadMyShipments);

  function showError(msg) {
    document.getElementById('errorMsg').textContent = msg;
    document.getElementById('alertError').classList.add('show');
  }
  function showSuccess(msg) {
    document.getElementById('successMsg').textContent = msg;
    document.getElementById('alertSuccess').classList.add('show');
    document.getElementById('alertError').classList.remove('show');
  }

  async function loadMyShipments() {
    try {
      const res = await fetch(`${API}/api/shipments?limit=50`, {
        headers: { 'Authorization': `Bearer ${token()}` }
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message);

      renderShipments(data.data || []);
    } catch (err) {
      showError('Failed to load shipments: ' + err.message);
    }
  }

  function renderShipments(shipments) {
    const list = document.getElementById('shipmentsList');

    if (!shipments.length) {
      list.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-box-open"></i>
          <h3>No shipments yet</h3>
          <p>You haven't been assigned any shipments.</p>
        </div>`;
      return;
    }

    list.innerHTML = shipments.map(s => {
      const isPending = s.status === 'Pending';
      const badgeClass = s.status === 'Assigned' ? 'badge-assigned' : s.status === 'In Transit' ? 'badge-transit' : 'badge-pending';

      return `
        <div class="card ${isPending ? 'awaiting' : ''}" id="card-${s._id}">
          <div class="card-header">
            <span class="shipment-id">${s.shipmentId}</span>
            <span class="badge ${badgeClass}">${s.status}</span>
          </div>

          ${isPending ? `<div style="font-size:13px;color:var(--warning);margin-bottom:14px;display:flex;align-items:center;gap:8px"><i class="fas fa-clock"></i> Awaiting your confirmation</div>` : ''}

          <div class="route-visual">
            <div class="route-point">
              <div class="label">📍 From</div>
              <div class="city">${s.origin?.city}, ${s.origin?.state}</div>
              <div class="addr">${s.origin?.address}</div>
            </div>
            <div class="route-arrow"><i class="fas fa-arrow-right"></i></div>
            <div class="route-point">
              <div class="label">🏁 To</div>
              <div class="city">${s.destination?.city}, ${s.destination?.state}</div>
              <div class="addr">${s.destination?.address}</div>
            </div>
          </div>

          <div class="info-grid">
            <div class="info-item"><label>Cargo</label><p>${s.cargoType}</p></div>
            <div class="info-item"><label>Weight</label><p>${s.weight} kg · ${s.quantity} ${s.unit}</p></div>
            <div class="info-item"><label>Pickup</label><p>${new Date(s.pickupDate).toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'})}</p></div>
            <div class="info-item"><label>Delivery By</label><p>${new Date(s.expectedDeliveryDate).toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'})}</p></div>
            <div class="info-item"><label>Priority</label><p>${s.priority}</p></div>
            <div class="info-item"><label>Vehicle</label><p>${s.vehicleType || 'Any'}</p></div>
          </div>

          ${isPending ? `
            <div class="action-bar">
              <button class="btn btn-accept" onclick="confirmShipment('${s._id}', 'accept', this)">
                <div class="spinner" id="spinner-accept-${s._id}"></div>
                <i class="fas fa-check"></i> Accept Shipment
              </button>
              <button class="btn btn-reject" onclick="confirmShipment('${s._id}', 'reject', this)">
                <div class="spinner" id="spinner-reject-${s._id}"></div>
                <i class="fas fa-times"></i> Reject
              </button>
            </div>
          ` : `
            <div class="confirmed-banner">
              <i class="fas fa-check-circle"></i>
              Shipment ${s.status === 'Assigned' ? 'accepted — ready to depart' : s.status}
            </div>
          `}
        </div>`;
    }).join('');
  }

  async function confirmShipment(shipmentId, action, btn) {
    const spinnerId = `spinner-${action}-${shipmentId}`;
    document.getElementById(spinnerId).style.display = 'block';
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/api/shipments/${shipmentId}/confirm`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token()}`
        },
        body: JSON.stringify({ action })
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.message);

      if (action === 'accept') {
        showSuccess(`Shipment ${data.data.shipmentId} accepted! Status: Assigned.`);
      } else {
        showSuccess(`Shipment rejected. It's been returned to the pending pool.`);
      }

      // Reload after short delay
      setTimeout(loadMyShipments, 1500);

    } catch (err) {
      showError(err.message);
      btn.disabled = false;
      document.getElementById(spinnerId).style.display = 'none';
    }
  }
</script>
</body>
</html>
