<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shipments — LogiFlow</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/shipments.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><span class="logo-icon">🚛</span><span class="logo-text">LogiFlow</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
      <a href="shipments.html" class="nav-item active">📦 Shipments</a>
      <a href="drivers.html"   class="nav-item">👤 Drivers</a>
      <a href="fleet.html"     class="nav-item">🚚 Fleet</a>
      <a href="gate-entry.html" class="nav-item">🚧 Gate Entry</a>
      <a href="payments.html"  class="nav-item">💰 Payments</a>
      <a href="analytics.html" class="nav-item">📈 Analytics</a>
      <a href="settings.html"  class="nav-item">⚙️ Settings</a>
    </nav>
  </aside>
  <main class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <h1 class="page-title">Shipments</h1>
      </div>
      <div class="topbar-right">
        <button class="btn btn-primary" onclick="openModal('create-shipment-modal')">+ New Shipment</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" id="stat-total">0</div></div>
      <div class="stat-card"><div class="stat-label">In Transit</div><div class="stat-value" id="stat-transit">0</div></div>
      <div class="stat-card"><div class="stat-label">Delivered</div><div class="stat-value" id="stat-delivered">0</div></div>
      <div class="stat-card"><div class="stat-label">Delayed</div><div class="stat-value" id="stat-delayed">0</div></div>
    </div>

    <!-- Filters -->
    <div class="filters-bar">
      <input type="text" class="search-input" placeholder="Search shipments..." oninput="searchShipments(this.value)"/>
      <select class="filter-select" onchange="filterShipments('status', this.value)">
        <option value="">All Status</option>
        <option value="pending">Pending</option>
        <option value="in_transit">In Transit</option>
        <option value="delivered">Delivered</option>
        <option value="delayed">Delayed</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <select class="filter-select" onchange="filterShipments('priority', this.value)">
        <option value="">All Priority</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
      <button class="btn btn-sm" onclick="exportShipments()">Export CSV</button>
    </div>

    <!-- Table -->
    <div class="table-wrapper">
      <table class="data-table" id="shipments-table">
        <thead>
          <tr>
            <th>Shipment ID</th>
            <th>Origin → Destination</th>
            <th>Client</th>
            <th>Driver</th>
            <th>Status</th>
            <th>Priority</th>
            <th>ETA</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="shipments-tbody"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </main>
</div>

<!-- Create Shipment Modal -->
<div class="modal-overlay" id="create-shipment-modal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3>New Shipment</h3>
      <button class="modal-close" onclick="closeModal('create-shipment-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-grid-3">
        <div class="form-row"><label>Shipment ID</label><input type="text" id="s-id" placeholder="Auto-generated" readonly/></div>
        <div class="form-row"><label>Client Name *</label><input type="text" id="s-client" placeholder="Client name"/></div>
        <div class="form-row"><label>Priority</label>
          <select id="s-priority"><option value="medium">Medium</option><option value="high">High</option><option value="low">Low</option></select>
        </div>
      </div>
      <div class="form-grid-2">
        <div class="form-row"><label>Origin *</label><input type="text" id="s-origin" placeholder="Pickup city/address"/></div>
        <div class="form-row"><label>Destination *</label><input type="text" id="s-dest" placeholder="Delivery city/address"/></div>
      </div>
      <div class="form-grid-3">
        <div class="form-row"><label>Weight (kg)</label><input type="number" id="s-weight" placeholder="0"/></div>
        <div class="form-row"><label>Goods Type</label><input type="text" id="s-goods" placeholder="e.g. Electronics"/></div>
        <div class="form-row"><label>ETA</label><input type="date" id="s-eta"/></div>
      </div>
      <div class="form-grid-2">
        <div class="form-row"><label>Assign Driver</label>
          <select id="s-driver"><option value="">Select driver...</option></select>
        </div>
        <div class="form-row"><label>Assign Vehicle</label>
          <select id="s-vehicle"><option value="">Select vehicle...</option></select>
        </div>
      </div>
      <div class="form-row"><label>Notes</label><textarea id="s-notes" rows="2" placeholder="Any special instructions..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('create-shipment-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="createShipment()">Create Shipment</button>
    </div>
  </div>
</div>

<!-- View Shipment Modal -->
<div class="modal-overlay" id="view-shipment-modal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3 id="view-title">Shipment Details</h3>
      <button class="modal-close" onclick="closeModal('view-shipment-modal')">×</button>
    </div>
    <div class="modal-body" id="view-body"></div>
  </div>
</div>

<script src="../js/app.js"></script>
<script src="../js/shipments.js"></script>
</body>
</html>
